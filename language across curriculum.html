<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBCC-320 Interactive Study Portal</title>
<style>
:root{--bg:#121212;--card:#1e1e1e;--accent:#5f6f86;--text:#f1f1f1}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Arial,sans-serif;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
header{text-align:center;padding:25px}
#search{width:min(700px,90%);padding:12px;border-radius:10px;border:none;display:block;margin:auto}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px}
.card{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:.3s}
.card:hover{transform:translateY(-5px)}
.unit{cursor:pointer;font-weight:bold;font-size:1.1rem}
.topics{display:none;margin-top:10px}
.topic{background:#2a2a2a;margin:6px 0;padding:10px;border-radius:8px;cursor:pointer}
.topic:hover{background:#343434}
.badge{font-size:.75rem;background:#444;padding:2px 6px;border-radius:6px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px)}
.modal-content{background:#1c1c1c;max-width:850px;margin:4% auto;padding:24px;border-radius:14px;animation:pop .25s}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.close{float:right;font-size:28px;cursor:pointer}
#content{line-height:1.7}
</style>
</head>
<body>
<header>
<h1>Language Across the Curriculum (EBCC-320)</h1>
<p>Interactive 10-Mark Answer Notes</p>
<input id="search" placeholder="Search topics...">
</header>

<div class="container" id="container"></div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h2 id="title"></h2>
<div id="content"></div>
</div>
</div>

<script>
const data=[
{unit:"Reference Books",topics:{
"Meaning":"Reference books are sources consulted for specific information rather than read continuously. They provide authentic and reliable knowledge for study, teaching and research. Examples include dictionaries, encyclopedias, atlases and handbooks.",
"Importance":"Reference books provide accurate information, support research, improve subject knowledge, promote self-learning, save time and help students complete assignments effectively. They are essential tools in academic work.",
"Selection Criteria":"A good reference book should be relevant, reliable, up-to-date, accurate and written by a credible author. Students should choose books that match the research objective.",
"Research Process":"Select a topic, frame guiding questions, locate reference books, collect information, make notes, organize findings and present the results systematically."
}},
{unit:"Scanning & Skimming",topics:{
"Scanning":"Scanning is a reading technique used to locate specific information quickly without reading the entire text. It is useful for finding dates, names, statistics and definitions. It saves time and supports research and examination preparation.",
"Skimming":"Skimming means reading rapidly to understand the general idea of a text. It focuses on headings, topic sentences and key ideas. It helps readers decide whether detailed reading is necessary.",
"Difference":"Scanning searches for specific details, whereas skimming focuses on overall meaning. Scanning is detail-oriented while skimming is overview-oriented."
}},
{unit:"Note Making",topics:{
"Meaning":"Note making is the process of recording important information in a concise and organized form. It improves understanding and makes revision easier.",
"Characteristics":"Good notes are brief, clear, organized, relevant and easy to revise.",
"Benefits":"Note making improves memory, comprehension, concentration and examination preparation.",
"Collating Notes":"Collating notes means collecting information from different sources and arranging it under suitable headings while removing repetition."
}},
{unit:"Presentation",topics:{
"Meaning":"A presentation is the organized communication of ideas, information or research findings before an audience.",
"Objectives":"To share knowledge, explain concepts, present findings, persuade audiences and encourage discussion.",
"Components":"Introduction, main content, visual aids, oral communication, conclusion and question-answer session.",
"Characteristics":"A good presentation is clear, logical, attractive, interactive and time-bound."
}},
{unit:"Educational Writing",topics:{
"Meaning":"Educational writing communicates ideas related to teaching, learning, schooling and educational issues.",
"Characteristics":"It is clear, accurate, objective, coherent, evidence-based and logically organized.",
"Theme":"The theme is the central idea or message discussed by the writer.",
"Argument":"An argument is a claim supported by evidence and reasoning.",
"Topic Sentence":"A topic sentence expresses the main idea of a paragraph and guides supporting details.",
"Connectors":"Words such as however, therefore, moreover and consequently connect ideas and improve coherence."
}},
{unit:"Response Paper",topics:{
"Meaning":"A response paper is a written reaction to a text, article, essay or presentation.",
"Structure":"Introduction, summary, personal response, critical analysis and conclusion.",
"Benefits":"It develops critical thinking, writing ability, reflection and deeper understanding of a text."
}},
{unit:"Language Across Curriculum",topics:{
"Meaning":"Language Across the Curriculum recognizes that language learning occurs in all subjects, not only language classes.",
"Objectives":"To improve communication, comprehension, critical thinking and academic achievement.",
"Importance":"Language helps students understand concepts across subjects. Every teacher contributes to language development."
}},
{unit:"Language Skills",topics:{
"Listening":"The ability to receive and understand spoken messages. It supports comprehension and learning.",
"Speaking":"The ability to express ideas orally and communicate effectively.",
"Reading":"The ability to understand written texts and acquire knowledge.",
"Writing":"The ability to express thoughts clearly in written form.",
"Importance":"LSRW (Listening, Speaking, Reading, Writing) are essential for communication, learning and academic success."
}},
{unit:"Acquired Language",topics:{
"Meaning":"Acquired language is learned naturally through interaction with family and society.",
"Examples":"Mother tongue and home language are common examples.",
"Importance":"It forms the foundation for communication, cognitive growth and future learning."
}},
{unit:"Thinking Ability",topics:{
"Meaning":"Thinking ability is the capacity to reason, analyze, evaluate and solve problems.",
"Importance":"It supports decision making, creativity, critical thinking and problem solving.",
"Educational Value":"Thinking ability promotes independent learning and academic achievement."
}}
];

const container=document.getElementById('container');

function render(filter=''){
container.innerHTML='';
data.forEach(u=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<div class='unit'>${u.unit}</div><div class='topics'></div>`;
const topicsDiv=card.querySelector('.topics');
Object.keys(u.topics).forEach(t=>{
if((u.unit+t+u.topics[t]).toLowerCase().includes(filter.toLowerCase())){
const d=document.createElement('div');
d.className='topic';
d.innerHTML=t+" <span class='badge'>10 Marks</span>";
d.onclick=()=>show(t,u.topics[t]);
topicsDiv.appendChild(d);
}
});
card.querySelector('.unit').onclick=()=>{
topicsDiv.style.display=topicsDiv.style.display==='block'?'none':'block';
};
container.appendChild(card);
});
}

function show(title,text){
document.getElementById('title').innerText=title;
document.getElementById('content').innerText=text;
document.getElementById('modal').style.display='block';
}
function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();
</script>
</body>
</html>
